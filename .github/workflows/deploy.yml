name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Write kubeconfig
        run: |
          echo '${{ secrets.KUBECONFIG }}' > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> "$GITHUB_ENV"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          # Pin to Helm 3. Helm 4's kstatus-based --wait reports healthy
          # resources (even a plain ClusterIP Service) as status=Unknown and
          # times out. Helm 3's legacy --wait handles them correctly.
          version: v3.21.0

      - name: Deploy with Helm
        run: |
          IMAGE_TAG="sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)"
          helm upgrade --install trips ./charts/trips \
            --namespace apps \
            --set app.image.tag="$IMAGE_TAG" \
            --wait \
            --timeout 10m
