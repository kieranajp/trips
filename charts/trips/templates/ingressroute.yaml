{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    # 1. Authentik forward-auth callback + sign-out (cross-namespace to the
    #    proxy outpost). No middleware — this path IS the auth machinery.
    - kind: Rule
      priority: 100
      match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/outpost.goauthentik.io/`)
      services:
        - name: ak-outpost-proxy
          namespace: auth
          port: 9000
    # 2. Login trigger (/login) + auth-state probe (/whoami). These are GETs,
    #    but must sit behind login: /login establishes the Authentik session,
    #    and /whoami lets the SPA read who (if anyone) is logged in. Higher
    #    priority than the public GET rule so these paths stay gated.
    - kind: Rule
      priority: 90
      match: Host(`{{ .Values.ingress.host }}`) && (Path(`/login`) || Path(`/whoami`))
      middlewares:
        - name: auth-private
          namespace: auth
      services:
        - name: {{ .Release.Name }}
          port: {{ .Values.app.service.port }}
    # 3. Trip attachments (/files) — boarding passes, tickets, personal docs.
    #    Gated for ALL methods incl. GET: ids are sequential and the blobs hold
    #    PII, so these must not fall through to the public-GET rule below.
    - kind: Rule
      priority: 85
      match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/files`)
      middlewares:
        - name: auth-private
          namespace: auth
      services:
        - name: {{ .Release.Name }}
          port: {{ .Values.app.service.port }}
    # 4. Short-link expander (/expand) — makes an outbound request to Google
    #    on the caller's behalf, so it's for editors only: gated even though
    #    it's a GET, ahead of the public-GET rule below.
    - kind: Rule
      priority: 84
      match: Host(`{{ .Values.ingress.host }}`) && Path(`/expand`)
      middlewares:
        - name: auth-private
          namespace: auth
      services:
        - name: {{ .Release.Name }}
          port: {{ .Values.app.service.port }}
    # 5. Public reads: anyone can view the site and pull trip state. No auth.
    - kind: Rule
      priority: 80
      match: Host(`{{ .Values.ingress.host }}`) && (Method(`GET`) || Method(`HEAD`) || Method(`OPTIONS`))
      services:
        - name: {{ .Release.Name }}
          port: {{ .Values.app.service.port }}
    # 6. Everything else — PUT (the only write today) plus any future
    #    POST/PATCH/DELETE — requires a valid Google session. Default closed:
    #    a new write verb is gated automatically without touching this file.
    - kind: Rule
      priority: 70
      match: Host(`{{ .Values.ingress.host }}`)
      middlewares:
        - name: auth-private
          namespace: auth
      services:
        - name: {{ .Release.Name }}
          port: {{ .Values.app.service.port }}
  tls:
    certResolver: letsencrypt
{{- end }}
