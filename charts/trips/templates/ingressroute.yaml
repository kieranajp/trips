{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    # Authentik forward-auth callback (cross-namespace to the proxy outpost).
    - kind: Rule
      match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/outpost.goauthentik.io/`)
      services:
        - name: ak-outpost-proxy
          namespace: auth
          port: 9000
    # Everything else requires a valid Google session
    - kind: Rule
      match: Host(`{{ .Values.ingress.host }}`)
      middlewares:
        - name: auth-private
          namespace: auth
      services:
        - name: {{ .Release.Name }}
          port: {{ .Values.app.service.port }}
  tls:
    certResolver: letsencrypt
{{- end }}
